methodology_summary: >
  Staged retrieve-then-rank over precomputed artifacts. Offline: each career
  role is embedded separately (all-MiniLM-L6-v2) and pooled with duration x
  recency weights; the skills list is excluded from embeddings as the planted
  trap. Online (<5s, pure NumPy): hard gates remove honeypots via provable
  internal impossibilities and apply the JD's stated disqualifiers; semantic
  retrieval against JD intent facets shortlists ~3k; core fit scores
  technical/shipping/experience/culture/logistics with a multiplicative
  technical gate so keyword stuffers cannot buy rank; 23 behavioral signals
  form a hireability score and an availability multiplier (stale stars sink);
  a trust multiplier discounts unverifiable claims. Final = trust x
  availability x (0.75 core + 0.25 behavioral). Reasoning is generated
  deterministically from profile facts only — no LLM calls anywhere in the
  ranking path. Validated locally via planted-trap synthetic harness
  (honeypot recall, twin tests, NDCG composite) plus unit tests on every gate.
